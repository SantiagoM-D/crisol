<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
    <nav class="site-nav">
      {%- for page in site.pages -%}
        {%- if page.title and page.layout == 'page' -%}
          <a href="{{ page.url | relative_url }}"{% if page.url == page.url %} class="nav-link"{% endif %}>
            {{ page.title | escape }}
          </a>
        {%- endif -%}
      {%- endfor -%}
    </nav>
  </div>
</header>
