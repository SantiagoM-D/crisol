services:
  tinacms:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - tina_modules:/app/node_modules
    ports:
      - "4001:4001"
      - "4002:4002"
    env_file:
      - .env.tina
    command: >
      sh -c "npm install && npx tinacms dev"

  tinacms-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - tina_modules:/app/node_modules
    env_file:
      - .env.tina
    command: >
      sh -c "npm install && npx tinacms build"

volumes:
  tina_modules:
